<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Header Section -->
        <header>
            <h1>AI Image Generator Tool JavaScript</h1>
            <p>Convert your text into an image within a second using this JavaScript-powered AI Image Generator tool.</p>
        </header>

        <!-- Search / Input Section -->
        <div class="search-box">
            <input type="text" id="user-prompt" placeholder="Describe what you want to see...">
            
            <div class="controls">
                <select id="image-count">
                    <option value="1">1 Image</option>
                    <option value="2">2 Images</option>
                    <option value="3">3 Images</option>
                    <option value="4" selected>4 Images</option>
                </select>
                <button id="generate-btn"
                    type="button">Generate</button>
            </div>
        </div>

        <!-- Image Display Grid Section -->
        <p id="status-message"></p>
        
        <div class="image-grid" 
            id="image-gallery">
            
            <div class="img-card"><div class="placeholder-icon">🖼️</div><p>Image 1</p></div>
            <div class="img-card"><div class="placeholder-icon">🖼️</div><p>Image 2</p></div>
            <div class="img-card"><div class="placeholder-icon">🖼️</div><p>Image 3</p></div>
            <div class="img-card"><div class="placeholder-icon">🖼️</div><p>Image 4</p></div>
        </div>
    </div>

    <!-- Linking the JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
